# GitHub Pages deploys automatically from the master branch root.
# No workflow action needed — pushing to master is all it takes.
#
# Settings required (one-time, in GitHub):
#   Repository → Settings → Pages → Source: Deploy from branch → master / (root)
#
# DNS required (one-time, at Hostinger hPanel → DNS Zone):
#   Remove A record pointing to 46.202.161.26
#   Add 4 A records pointing to:
#     185.199.108.153
#     185.199.109.153
#     185.199.110.153
#     185.199.111.153
#   Add AAAA records:
#     2606:50c0:8000::153
#     2606:50c0:8001::153
#     2606:50c0:8002::153
#     2606:50c0:8003::153
